{% extends 'base.html' %}

{% block title %}
首页 - 个人收支记账系统
{% endblock %}

{% block content %}
<div class="row mt-4">
    <h2>欢迎，{{ username }}！</h2>
    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">收入总额</h5>
                <h6 class="card-subtitle mb-2 text-muted">¥{{ total_income }}</h6>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">支出总额</h5>
                <h6 class="card-subtitle mb-2 text-muted">¥{{ total_expense }}</h6>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">当前结余</h5>
                <h6 class="card-subtitle mb-2 text-muted">¥{{ balance }}</h6>
            </div>
        </div>
    </div>
    <div class="col-md-6 mt-4">
        <div class="card">
            <div class="card-header">
                本月每日支出
            </div>
            <div class="card-body">
                <canvas id="dailySpendingChart" width="200" height="100"></canvas>
            </div>
        </div>
    </div>
    <div class="col-md-6 mt-4">
        <div class="card">
            <div class="card-header">
                月度支出趋势
            </div>
            <div class="card-body">
                <canvas id="monthlySpendingChart" width="200" height="100"></canvas>
            </div>
        </div>
    </div>
</div>
<script>
    function renderLineChart(canvasId, data) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.labels,
                datasets: [{
                    label: '支出金额',
                    data: data.amounts,
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        fetch('/monthly_spending_data')
            .then(response => response.json())
            .then(data => renderLineChart('monthlySpendingChart', data));

        fetch('/daily_spending_data')
            .then(response => response.json())
            .then(data => renderLineChart('dailySpendingChart', data));
    });
</script>
{% endblock %}
