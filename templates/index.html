{% extends 'base.html' %}

{% block title %}
首页 - AI收支管理系统
{% endblock %}

{% block content %}
<div class="row mt-2">
    <div class="col-12 mb-4">
        <h2 class="fw-bold">欢迎回来，<span class="gradient-text">{{ username }}</span>！<i class="fa-solid fa-hand-sparkles text-warning ms-2"></i></h2>
        <p class="text-secondary">这是您今日的收支状况与财务洞察分析。</p>
    </div>

    <div class="col-md-4 mb-4">
        <div class="card h-100">
            <div class="card-body d-flex flex-column justify-content-between">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="text-secondary fw-medium">收入总额 (本期)</span>
                    <div class="p-3 rounded-circle" style="background: rgba(16, 185, 129, 0.15); color: #10b981;">
                        <i class="fa-solid fa-arrow-trend-up fs-4"></i>
                    </div>
                </div>
                <div>
                    <h3 class="fw-bold mb-0" style="color: #10b981;">¥{{ total_income }}</h3>
                    <small class="text-secondary">较上期统计持续追踪</small>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-4 mb-4">
        <div class="card h-100">
            <div class="card-body d-flex flex-column justify-content-between">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="text-secondary fw-medium">支出总额 (本期)</span>
                    <div class="p-3 rounded-circle" style="background: rgba(244, 63, 94, 0.15); color: #f43f5e;">
                        <i class="fa-solid fa-arrow-trend-down fs-4"></i>
                    </div>
                </div>
                <div>
                    <h3 class="fw-bold mb-0" style="color: #f43f5e;">¥{{ total_expense }}</h3>
                    <small class="text-secondary">合理控管，精明消费</small>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-4 mb-4">
        <div class="card h-100">
            <div class="card-body d-flex flex-column justify-content-between">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="text-secondary fw-medium">当前结余</span>
                    <div class="p-3 rounded-circle" style="background: rgba(37, 99, 235, 0.15); color: #2563eb;">
                        <i class="fa-solid fa-wallet fs-4"></i>
                    </div>
                </div>
                <div>
                    <h3 class="fw-bold mb-0 gradient-text">¥{{ balance }}</h3>
                    <small class="text-secondary">自由稳健的财产状态</small>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-6 mt-2 mb-4">
        <div class="card h-100">
            <div class="card-header d-flex align-items-center">
                <i class="fa-solid fa-calendar-day me-2 text-primary"></i>本月每日支出趋势
            </div>
            <div class="card-body">
                <canvas id="dailySpendingChart" style="max-height: 280px;"></canvas>
            </div>
        </div>
    </div>

    <div class="col-md-6 mt-2 mb-4">
        <div class="card h-100">
            <div class="card-header d-flex align-items-center">
                <i class="fa-solid fa-chart-line me-2" style="color: #ec4899;"></i>月度支出对比
            </div>
            <div class="card-body">
                <canvas id="monthlySpendingChart" style="max-height: 280px;"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    // 配置 Chart.js 全局浅色清透玻璃风格
    Chart.defaults.color = '#64748b';
    Chart.defaults.borderColor = 'rgba(148, 163, 184, 0.18)';
    Chart.defaults.font.family = "'Outfit', 'Poppins', 'Microsoft YaHei', sans-serif";

    function renderLineChart(canvasId, data, colorHex, bgHex) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        
        // 创建渐变填充
        const gradient = ctx.createLinearGradient(0, 0, 0, 300);
        gradient.addColorStop(0, bgHex);
        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.labels,
                datasets: [{
                    label: '支出金额 (¥)',
                    data: data.amounts,
                    backgroundColor: gradient,
                    borderColor: colorHex,
                    borderWidth: 3,
                    pointBackgroundColor: colorHex,
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointRadius: 4,
                    pointHoverRadius: 6,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        backgroundColor: 'rgba(30, 41, 59, 0.92)',
                        titleColor: '#fff',
                        bodyColor: '#38bdf8',
                        borderColor: 'rgba(255, 255, 255, 0.2)',
                        borderWidth: 1,
                        padding: 12,
                        boxPadding: 6,
                        usePointStyle: true,
                        callbacks: {
                            label: function(context) {
                                return ' 支出: ¥' + context.parsed.y;
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: {
                            color: 'rgba(148, 163, 184, 0.15)'
                        }
                    },
                    x: {
                        grid: {
                            display: false
                        }
                    }
                }
            }
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        fetch('/monthly_spending_data')
            .then(response => response.json())
            .then(data => renderLineChart('monthlySpendingChart', data, '#ec4899', 'rgba(236, 72, 153, 0.25)'));

        fetch('/daily_spending_data')
            .then(response => response.json())
            .then(data => renderLineChart('dailySpendingChart', data, '#2563eb', 'rgba(37, 99, 235, 0.25)'));
    });
</script>
{% endblock %}
